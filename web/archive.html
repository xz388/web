<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrotherHood — Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; }
        body {
            background:#050508; color:#e8e8f0; font-family:'Inter',sans-serif;
            background-image:radial-gradient(ellipse at 15% 30%, rgba(255,215,0,0.03) 0%, transparent 60%),radial-gradient(ellipse at 85% 70%, rgba(180,120,20,0.02) 0%, transparent 60%);
        }
        .page {
            width:100%; height:100vh; overflow:hidden;
            background:linear-gradient(165deg,#0a0a18 0%,#060610 40%,#0c0c1a 100%);
            display:flex; align-items:center; justify-content:center; padding:0 40px; position:relative;
        }
        .page::before {
            content:''; position:absolute; top:-60%; left:-50%; width:200%; height:200%;
            background:conic-gradient(from 30deg at 50% 50%, transparent 0%, rgba(255,215,0,0.012) 25%, transparent 50%, rgba(180,120,20,0.008) 75%, transparent 100%);
            animation:spin 25s linear infinite; pointer-events:none;
        }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        .page::after {
            content:''; position:absolute; inset:0;
            background:radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.04) 0%, transparent 50%);
            pointer-events:none;
        }
        .inner {
            position:relative; z-index:1;
            width:100%; max-width:620px; max-height:100vh; display:flex; flex-direction:column;
        }
        .top {
            display:flex; align-items:center; gap:16px; margin-bottom:24px; flex-shrink:0;
            padding:16px 24px; border-radius:16px;
            background:rgba(255,255,255,0.02); border:1px solid rgba(255,215,0,0.06);
            backdrop-filter:blur(12px); position:relative; overflow:hidden;
        }
        .top::before {
            content:''; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.15), transparent);
        }
        .top a {
            color:#5555aa; text-decoration:none; font-size:0.7rem; transition:0.3s;
            letter-spacing:1.5px; display:flex; align-items:center; gap:6px;
            padding:8px 14px; border-radius:8px; background:rgba(255,255,255,0.02);
            border:1px solid rgba(255,255,255,0.03);
        }
        .top a:hover { color:#ffd700; background:rgba(255,215,0,0.04); border-color:rgba(255,215,0,0.08); }
        .top .title-group { flex:1; text-align:center; }
        .top .title-group h1 {
            font-family:'Orbitron',monospace; font-size:0.9rem; color:#ffd700;
            letter-spacing:3px; text-shadow:0 0 20px rgba(255,215,0,0.08);
        }
        .top .title-group span {
            display:block; font-family:'Playfair Display',serif; font-style:italic;
            font-size:0.6rem; color:#555599; letter-spacing:4px; font-weight:400; margin-top:3px;
        }

        .list-wrap {
            flex:1; overflow-y:auto; min-height:0; padding:4px 4px 4px 0;
            scroll-behavior:smooth;
        }
        .list-wrap::-webkit-scrollbar { width:4px; }
        .list-wrap::-webkit-scrollbar-track { background:transparent; }
        .list-wrap::-webkit-scrollbar-thumb { background:rgba(255,215,0,0.1); border-radius:10px; }

        .card {
            padding:20px 24px; margin-bottom:10px; border-radius:16px;
            border:1px solid rgba(255,215,0,0.04);
            background:linear-gradient(145deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.005) 100%);
            transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            position:relative; overflow:hidden;
            backdrop-filter:blur(4px);
            animation:cardIn 0.5s ease both;
        }
        .card:nth-child(1) { animation-delay:0.02s; }
        .card:nth-child(2) { animation-delay:0.08s; }
        .card:nth-child(3) { animation-delay:0.14s; }
        .card:nth-child(4) { animation-delay:0.20s; }
        .card:nth-child(5) { animation-delay:0.26s; }
        .card:nth-child(6) { animation-delay:0.32s; }
        .card:nth-child(7) { animation-delay:0.38s; }
        .card:nth-child(8) { animation-delay:0.44s; }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(14px) scale(0.97); }
            to { opacity:1; transform:translateY(0) scale(1); }
        }
        .card::before {
            content:''; position:absolute; left:0; top:8px; bottom:8px; width:2px;
            background:linear-gradient(180deg, #ffd700, rgba(255,215,0,0.2), transparent);
            border-radius:2px; opacity:0.4; transition:opacity 0.3s;
        }
        .card::after {
            content:''; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.04), transparent);
        }
        .card:hover {
            transform:translateX(5px) translateY(-2px);
            border-color:rgba(255,215,0,0.12);
            background:linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,215,0,0.01) 100%);
            box-shadow:0 12px 40px rgba(0,0,0,0.4), 0 0 30px rgba(255,215,0,0.02);
        }
        .card:hover::before { opacity:0.8; }
        .card .date {
            font-size:0.55rem; color:#5555aa; letter-spacing:2px; text-transform:uppercase;
            margin-bottom:6px; font-weight:600;
        }
        .card .title {
            font-weight:600; font-size:0.95rem; color:#eee;
            letter-spacing:0.3px;
        }
        .card .desc {
            font-size:0.78rem; color:#7777aa; margin-top:5px; font-weight:300;
            line-height:1.5;
        }
        .empty {
            text-align:center; padding:100px 20px; color:#444488;
            animation:cardIn 0.6s ease both;
        }
        .empty .big { font-size:3rem; display:block; margin-bottom:16px; opacity:0.6; }
        .empty .txt { font-size:0.8rem; letter-spacing:1px; font-weight:300; color:#5555aa; }
        .empty .sub { font-size:0.65rem; color:#444477; margin-top:8px; letter-spacing:0.5px; }

        .music-bar {
            flex-shrink:0; margin-top:16px;
            padding:14px 20px; border-radius:16px;
            border:1px solid rgba(255,215,0,0.06);
            background:rgba(255,255,255,0.015);
            backdrop-filter:blur(12px);
            display:flex; align-items:center; gap:12px;
            position:relative; overflow:hidden;
        }
        .music-bar::before {
            content:''; position:absolute; bottom:0; left:10%; right:10%; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.08), transparent);
        }
        .music-bar .info { flex:1; overflow:hidden; }
        .music-bar .info .track-name {
            font-size:0.72rem; color:#9999bb; white-space:nowrap;
            overflow:hidden; text-overflow:ellipsis; font-weight:400;
        }
        .music-bar .info .track-status { font-size:0.55rem; color:#5555aa; margin-top:1px; }
        .music-bar .ctrl {
            background:none; border:1px solid rgba(255,215,0,0.06);
            color:#ffd700; cursor:pointer; font-size:1rem;
            width:36px; height:36px; border-radius:10px;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.3s; flex-shrink:0;
        }
        .music-bar .ctrl:hover {
            background:rgba(255,215,0,0.08); border-color:rgba(255,215,0,0.15);
            transform:scale(1.05);
        }
        .music-bar .ctrl.vol { color:#6666aa; border-color:rgba(255,255,255,0.04); }
        .music-bar .ctrl.vol:hover { color:#ffd700; border-color:rgba(255,215,0,0.1); }

        .recent-badge {
            display:inline-block; padding:2px 10px;
            background:rgba(255,215,0,0.08); border:1px solid rgba(255,215,0,0.1);
            border-radius:50px; font-size:0.55rem; color:#ffd700;
            letter-spacing:1px; margin-top:4px; font-weight:600;
        }

        @media (max-width:600px) {
            .page { padding:0 16px; }
            .card { padding:14px 18px; }
            .top { padding:12px 16px; gap:10px; flex-wrap:wrap; justify-content:center; }
            .top .title-group { order:-1; width:100%; }
            .card .title { font-size:0.85rem; }
            .best-banner { padding:12px 14px !important; }
            .best-banner [style*="font-size:1.5rem"] { font-size:1.2rem !important; }
            .best-banner #bestPlayerName { font-size:0.85rem !important; }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="inner">
        <div class="top">
            <a href="index.html">← Home</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="world-records.html">Records</a>
            <div class="title-group">
                <h1>✦ Archive ✦</h1>
                <span>BrotherHood — History</span>
            </div>
        </div>
        <div id="bestPlayerBanner" class="best-banner" style="display:none;margin-bottom:16px;padding:14px 22px;border-radius:12px;background:linear-gradient(135deg,rgba(255,215,0,0.06),rgba(255,215,0,0.01));border:1px solid rgba(255,215,0,0.12);text-align:center;position:relative;overflow:hidden;flex-shrink:0;">
            <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,215,0,0.04),transparent 60%);pointer-events:none;"></div>
            <div style="position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;">
                <span style="font-size:1.5rem;line-height:1;">👑</span>
                <div>
                    <div style="font-size:0.55rem;color:#8888bb;letter-spacing:2px;text-transform:uppercase;font-weight:600;">🏆 The Best Player Right Now</div>
                    <div id="bestPlayerName" style="font-family:'Orbitron',monospace;font-size:1rem;color:#ffd700;letter-spacing:2px;margin-top:3px;text-shadow:0 0 30px rgba(255,215,0,0.1);"></div>
                </div>
                <a href="leaderboard.html" style="padding:6px 16px;border-radius:8px;border:1px solid rgba(255,215,0,0.2);background:rgba(255,215,0,0.05);color:#ffd700;text-decoration:none;font-size:0.55rem;font-weight:600;letter-spacing:1px;transition:0.3s;white-space:nowrap;">View →</a>
            </div>
        </div>
        <div class="list-wrap" id="archiveList"></div>
        <div class="music-bar">
            <button class="ctrl" id="abPlay">▶</button>
            <div class="info">
                <div class="track-name" id="abTrack">No track</div>
                <div class="track-status" id="abStatus">—</div>
            </div>
            <button class="ctrl vol" id="abVol">♫</button>
        </div>
    </div>
</div>
<script>
const FB_UPDATES_URL = 'https://webb-d05d3-default-rtdb.firebaseio.com/updates.json';
let updData;
try { updData = JSON.parse(localStorage.getItem('bhUpdates')); } catch(e) {}
if (!updData) updData = [];

function renderArchive() {
    const el = document.getElementById('archiveList');
    if (updData.length <= 5) {
        el.innerHTML = '<div class="empty"><span class="big">📜</span><div class="txt">No archived updates yet</div><div class="sub">Older updates will appear here automatically</div></div>';
        return;
    }
    el.innerHTML = updData.slice(5).map(u => {
        const d = new Date(u.date);
        const dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        return `<div class="card"><div class="date">${dateStr}</div><div class="title">${u.title}</div>${u.desc?'<div class="desc">'+u.desc+'</div>':''}</div>`;
    }).join('');
    document.querySelectorAll('.card').forEach((c,i) => {
        c.style.animation = 'none';
        c.offsetHeight;
        c.style.animation = `cardIn 0.5s ease ${i*0.06}s both`;
    });
}
renderArchive();
(function() {
    var x = new XMLHttpRequest();
    x.open('GET', FB_UPDATES_URL);
    x.onload = function() {
        if (x.status === 200) {
            try {
                var d = JSON.parse(x.responseText);
                if (d && d.length) {
                    updData = d;
                    try { localStorage.setItem('bhUpdates', JSON.stringify(updData)); } catch(e) {}
                    renderArchive();
                }
            } catch(e) {}
        }
    };
    x.send();
})();

(function(){var data;try{data=JSON.parse(localStorage.getItem('bhLeaderboard'));if(!data||!data.length)throw''}catch(e){data=[]}var sorted=data.slice().sort(function(a,b){var ma=(a.goals||0)*100+(a.assists||0)*50+(a.saves||0)*50,mb=(b.goals||0)*100+(b.assists||0)*50+(b.saves||0)*50;if(a.champion!==b.champion)return b.champion-a.champion;if(a.mvp!==b.mvp)return b.mvp-a.mvp;return ma!==mb?mb-ma:0});if(sorted.length){var top=sorted[0];var bn=document.getElementById('bestPlayerName');var bb=document.getElementById('bestPlayerBanner');if(bn&&bb){var nm=top.nameAr?top.name+' ('+top.nameAr+')':top.name;bn.textContent=nm;bb.style.display='block'}}})();
try { localStorage.setItem('bhFromInternal', '1'); } catch(e) {}
const abPlay = document.getElementById('abPlay');
const abTrack = document.getElementById('abTrack');
const abStatus = document.getElementById('abStatus');
const abVol = document.getElementById('abVol');
const audio = new Audio();
audio.volume = 0.05;
let synced = false;

function syncAudio() {
    try {
        const saved = JSON.parse(localStorage.getItem('bhAudio'));
        if (saved && saved.src) {
            audio.src = saved.src;
            if (saved.ct > 0) audio.currentTime = saved.ct;
            audio.volume = saved.vol || 0.05;
            audio.muted = saved.muted || false;
            if (saved.playing) audio.play().catch(()=>{});
            abTrack.textContent = decodeURIComponent(saved.src.split('/').pop().replace(/%20/g,' ')).replace(/\.mp3$/,'');
            abStatus.textContent = saved.playing ? 'Playing' : 'Paused';
            abPlay.textContent = saved.playing ? '⏸' : '▶';
            synced = true;
        }
    } catch(e) {}
    if (!synced) { abTrack.textContent = 'No track'; abStatus.textContent = '—'; }
}
syncAudio();

audio.addEventListener('play', ()=>{ abPlay.textContent='⏸'; abStatus.textContent='Playing'; saveState(); });
audio.addEventListener('pause', ()=>{ abPlay.textContent='▶'; abStatus.textContent='Paused'; saveState(); });
function saveState() {
    try { localStorage.setItem('bhAudio',JSON.stringify({src:audio.src,ct:audio.currentTime,cur:0,vol:audio.volume,playing:!audio.paused,muted:audio.muted})); } catch(e) {}
}
audio.addEventListener('timeupdate', saveState);
abPlay.addEventListener('click', ()=>{ if(audio.src){ if(audio.paused) audio.play().catch(()=>{}); else audio.pause(); }});
abVol.addEventListener('click', ()=>{ audio.muted=!audio.muted; abVol.textContent=audio.muted?'♪':'♫'; saveState(); });
setInterval(()=>{ if(!audio.paused&&audio.duration) abStatus.textContent=(audio.currentTime/audio.duration*100).toFixed(0)+'%'; },2000);
</script>
</body>
</html>
