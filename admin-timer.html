<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrotherHood — Timer Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&family=Playfair+Display:ital@0;1&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; }
        body {
            background:#050508; color:#e8e8f0; font-family:'Inter',sans-serif;
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(255,215,0,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 80%, rgba(180,120,20,0.03) 0%, transparent 60%);
        }
        .scanline {
            position:fixed; inset:0; pointer-events:none; z-index:9999;
            background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px);
        }
        .page {
            width:100%; height:100vh; overflow:hidden;
            background:linear-gradient(165deg,#0a0a18 0%,#060610 40%,#0c0c1a 100%);
            display:flex; align-items:center; justify-content:center; padding:0 60px; position:relative;
        }
        .page::before {
            content:''; position:absolute; top:-60%; left:-50%; width:200%; height:200%;
            background:conic-gradient(from 30deg at 50% 50%, transparent 0%, rgba(255,215,0,0.015) 25%, rgba(180,120,20,0.01) 35%, transparent 50%, rgba(255,215,0,0.008) 75%, transparent 100%);
            animation:spin 30s linear infinite; pointer-events:none;
        }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        .page::after {
            content:''; position:absolute; inset:0;
            background:radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.06) 0%, transparent 50%);
            pointer-events:none;
        }
        .inner {
            position:relative; z-index:1;
            width:100%; max-width:500px; max-height:100vh; display:flex; flex-direction:column;
        }
        .top {
            display:flex; align-items:center; gap:16px; margin-bottom:22px; flex-shrink:0;
            padding:14px 22px; border-radius:16px;
            background:rgba(255,255,255,0.02); border:1px solid rgba(255,215,0,0.06);
            backdrop-filter:blur(16px); position:relative; overflow:hidden;
            animation:fadeDown 0.4s ease both;
        }
        @keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
        .top::before {
            content:''; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
        }
        .top a {
            color:#5555aa; text-decoration:none; font-size:0.6rem; transition:0.3s;
            letter-spacing:2px; display:flex; align-items:center; gap:6px;
            padding:7px 12px; border-radius:8px; background:rgba(255,255,255,0.02);
            border:1px solid rgba(255,255,255,0.03); font-weight:600;
        }
        .top a:hover { color:#ffd700; background:rgba(255,215,0,0.04); border-color:rgba(255,215,0,0.08); }
        .top .title-group { flex:1; text-align:center; }
        .top .title-group h1 {
            font-family:'Orbitron',monospace; font-size:0.85rem; color:#ffd700;
            letter-spacing:4px; text-shadow:0 0 30px rgba(255,215,0,0.08);
        }
        .top .title-group span {
            display:block; font-family:'Playfair Display',serif; font-style:italic;
            font-size:0.55rem; color:#555599; letter-spacing:5px; font-weight:400; margin-top:3px;
        }
        .form-scroll {
            flex:1; overflow-y:auto; min-height:0; padding:4px 6px 4px 0;
        }
        .form-scroll::-webkit-scrollbar { width:3px; }
        .form-scroll::-webkit-scrollbar-track { background:transparent; }
        .form-scroll::-webkit-scrollbar-thumb { background:rgba(255,215,0,0.08); border-radius:10px; }
        .fade-group { animation:fadeUp 0.5s ease both; }
        .fade-group:nth-child(1) { animation-delay:0.05s; }
        .fade-group:nth-child(2) { animation-delay:0.10s; }
        .fade-group:nth-child(3) { animation-delay:0.15s; }
        .fade-group:nth-child(4) { animation-delay:0.20s; }
        .fade-group:nth-child(5) { animation-delay:0.25s; }
        .fade-group:nth-child(6) { animation-delay:0.30s; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .field-wrap { margin-bottom:14px; }
        .field-wrap label {
            display:block; font-size:0.5rem; color:#5555aa;
            letter-spacing:2.5px; margin-bottom:6px; text-transform:uppercase; font-weight:600;
        }
        .field-wrap input {
            width:100%; padding:11px 16px; border-radius:10px;
            border:1px solid rgba(255,255,255,0.03);
            background:rgba(255,255,255,0.01);
            color:#ddd; font-size:0.82rem; outline:none;
            font-family:'Inter',sans-serif; transition:all 0.3s;
        }
        .field-wrap input:focus {
            border-color:rgba(255,215,0,0.2);
            background:rgba(255,215,0,0.015);
            box-shadow:0 0 30px rgba(255,215,0,0.04), inset 0 0 20px rgba(255,215,0,0.01);
        }
        .field-wrap input[type="number"] { -moz-appearance:textfield; }
        .field-wrap input[type="number"]::-webkit-outer-spin-button,
        .field-wrap input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
        .row { display:flex; gap:8px; }
        .row > * { flex:1; }
        .btn {
            padding:13px 22px; border:none; border-radius:12px; cursor:pointer;
            font-weight:700; font-size:0.65rem; letter-spacing:3px; text-transform:uppercase;
            width:100%; transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            position:relative; overflow:hidden;
        }
        .btn-gold {
            background:linear-gradient(135deg,#ffd700,#b8860b,#ffd700);
            background-size:200% 200%;
            color:#050508; animation:shimmer 4s ease infinite;
        }
        @keyframes shimmer { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
        .btn-gold:hover { transform:translateY(-2px) scale(1.01); box-shadow:0 10px 40px rgba(255,215,0,0.15); }
        .btn-red {
            background:rgba(255,50,50,0.06); color:#ff5555;
            border:1px solid rgba(255,50,50,0.05); margin-top:6px;
        }
        .btn-red:hover { background:rgba(255,50,50,0.12); border-color:rgba(255,50,50,0.1); transform:translateY(-1px); }
        .btn-outline {
            background:rgba(255,255,255,0.01); color:#8888bb;
            border:1px solid rgba(255,255,255,0.04); margin-top:6px;
        }
        .btn-outline:hover { background:rgba(255,255,255,0.04); border-color:rgba(255,215,0,0.08); color:#ffd700; transform:translateY(-1px); }
        .btn-group { display:flex; gap:8px; margin-top:6px; }
        .btn-group .btn { margin-top:0; }
        hr { border:none; height:1px; background:linear-gradient(90deg, transparent, rgba(255,215,0,0.06), transparent); margin:14px 0; flex-shrink:0; }
        .note { text-align:center; font-size:0.5rem; color:#5555aa; margin:6px 0; flex-shrink:0; letter-spacing:1px; }
        .timer-display {
            padding:18px 20px; border-radius:14px;
            border:1px solid rgba(255,215,0,0.08);
            background:rgba(255,255,255,0.015);
            backdrop-filter:blur(14px);
            text-align:center; position:relative; overflow:hidden;
            animation:fadeUp 0.5s ease 0.20s both;
        }
        .timer-display::before {
            content:''; position:absolute; bottom:0; left:10%; right:10%; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.08), transparent);
        }
        .timer-display .t-label { font-size:0.5rem; color:#5555aa; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
        .timer-display .t-title { font-size:0.85rem; color:#ffd700; font-weight:600; margin-bottom:6px; }
        .timer-display .t-remaining { font-family:'Orbitron',monospace; font-size:1.6rem; color:#fff; letter-spacing:6px; }
        .timer-display .t-sep { color:#5555aa; font-size:0.55rem; margin-top:4px; }
        .timer-display .t-inactive { color:#5555aa; font-size:0.7rem; }
        .music-bar {
            flex-shrink:0; margin-top:14px;
            padding:12px 18px; border-radius:14px;
            border:1px solid rgba(255,215,0,0.06);
            background:rgba(255,255,255,0.015);
            backdrop-filter:blur(14px);
            display:flex; align-items:center; gap:12px;
            position:relative; overflow:hidden;
            animation:fadeUp 0.5s ease 0.30s both;
        }
        .music-bar::before {
            content:''; position:absolute; bottom:0; left:10%; right:10%; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.08), transparent);
        }
        .music-bar .info { flex:1; overflow:hidden; }
        .music-bar .info .track-name { font-size:0.65rem; color:#9999bb; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:400; }
        .music-bar .info .track-status { font-size:0.5rem; color:#5555aa; margin-top:2px; }
        .music-bar .ctrl {
            background:none; border:1px solid rgba(255,215,0,0.06);
            color:#ffd700; cursor:pointer; font-size:0.9rem;
            width:32px; height:32px; border-radius:9px;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.3s; flex-shrink:0;
        }
        .music-bar .ctrl:hover { background:rgba(255,215,0,0.08); border-color:rgba(255,215,0,0.15); transform:scale(1.08); }
        .music-bar .ctrl.vol { color:#6666aa; border-color:rgba(255,255,255,0.04); }
        .music-bar .ctrl.vol:hover { color:#ffd700; }
        @media (max-width:700px) {
            .page { padding:0 16px; }
            .top { padding:10px 14px; gap:8px; flex-wrap:wrap; justify-content:center; }
            .top .title-group { order:-1; width:100%; }
            .row { gap:6px; }
            .field-wrap { margin-bottom:10px; }
        }
    </style>
</head>
<body>
<div class="scanline"></div>
<div class="page">
    <div class="inner">
        <div class="top">
            <a href="admin.html">← Dashboard</a>
            <div class="title-group">
                <h1>✦ Timer Manager ✦</h1>
                <span>Set countdown timers for the server</span>
            </div>
        </div>
        <div class="form-scroll">
            <div class="fade-group">
                <div class="field-wrap">
                    <label>Title — What is this timer for?</label>
                    <input type="text" id="timerTitle" placeholder="e.g. Event starts in..." />
                </div>
            </div>
            <div class="fade-group">
                <div class="row">
                    <div class="field-wrap"><label>Days</label><input type="number" id="timerDays" min="0" value="0" /></div>
                    <div class="field-wrap"><label>Hours</label><input type="number" id="timerHours" min="0" max="24" value="0" /></div>
                    <div class="field-wrap"><label>Minutes</label><input type="number" id="timerMinutes" min="0" max="60" value="0" /></div>
                </div>
            </div>
            <div class="fade-group">
                <div class="btn-group">
                    <button class="btn btn-gold" id="timerStart">Start Timer</button>
                    <button class="btn btn-red" id="timerStop" style="display:none">Stop Timer</button>
                </div>
            </div>
            <div class="fade-group">
                <button class="btn btn-outline" id="timerRefresh">⟳ Refresh</button>
            </div>
            <hr />
            <div class="fade-group">
                <div class="timer-display" id="timerDisplay">
                    <div class="t-label">Current Timer</div>
                    <div class="t-inactive" id="timerStatus">No active timer</div>
                </div>
            </div>
        </div>
        <div class="music-bar">
            <button class="ctrl" id="abPlay">▶</button>
            <div class="info">
                <div class="track-name" id="abTrack">No track</div>
                <div class="track-status" id="abStatus">—</div>
            </div>
            <button class="ctrl vol" id="abVol">♫</button>
        </div>
    </div>
</div>
<script>
const FB_URL = 'https://webb-d05d3-default-rtdb.firebaseio.com';
const WH_URL = 'https://discord.com/api/webhooks/1511811919693221918/V6c6tcZyavGub4RiBLQAxZRa1It5DX2sbE7Zzyux2_VriADctCR7aqnu1jSWvRaQFdTw';
const SITE_URL = 'https://xz388.github.io/web/';
let timerRefreshInterval = null;
let _timerCache = null;
function getTimer() { return _timerCache; }
function setTimer(t) { _timerCache = t; syncTimerToFB(t); }
function syncTimerToFB(t) {
  var x = new XMLHttpRequest();
  if (t) { x.open('PUT', FB_URL+'/timerConfig.json'); x.setRequestHeader('Content-Type','application/json'); x.send(JSON.stringify(t)); }
  else { x.open('DELETE', FB_URL+'/timerConfig.json'); x.send(); }
}
function loadTimerFromFB(cb) {
  var x = new XMLHttpRequest();
  x.open('GET', FB_URL+'/timerConfig.json');
  x.onload = function() { try { _timerCache = JSON.parse(x.responseText); } catch(e) { _timerCache = null; } if (cb) cb(_timerCache); renderTimer(); };
  x.onerror = function() { _timerCache = null; if (cb) cb(null); renderTimer(); };
  x.send();
}
function fmtDuration(ms) {
    if (ms <= 0) return '0m';
    const d = Math.floor(ms / 86400000);
    const h = Math.floor((ms % 86400000) / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    var parts = [];
    if (d > 0) parts.push(d+'d');
    if (h > 0) parts.push(h+'h');
    if (m > 0) parts.push(m+'m');
    if (s > 0 || parts.length === 0) parts.push(s+'s');
    return parts.join(' ');
}
function getRemaining(t) {
    if (!t || !t.active || !t.endTime) return 0;
    return Math.max(0, t.endTime - Date.now());
}
function renderTimer() {
    const t = getTimer();
    const display = document.getElementById('timerDisplay');
    const status = document.getElementById('timerStatus');
    const startBtn = document.getElementById('timerStart');
    const stopBtn = document.getElementById('timerStop');
    if (t && t.active) {
        var rem = getRemaining(t);
        if (rem <= 0) {
            stopBtn.style.display = 'none';
            startBtn.style.display = '';
            display.innerHTML = '<div class="t-label">Current Timer</div><div class="t-title">'+(t.title||'')+'</div><div class="t-inactive">⏰ Timer expired</div>';
            if (timerRefreshInterval) { clearInterval(timerRefreshInterval); timerRefreshInterval = null; }
            return;
        }
        display.innerHTML = '<div class="t-label">Current Timer</div><div class="t-title">'+(t.title||'')+'</div><div class="t-remaining" id="tRemaining">'+fmtDuration(rem)+'</div><div class="t-sep">remaining</div>';
        startBtn.style.display = 'none';
        stopBtn.style.display = '';
        if (!timerRefreshInterval) {
            timerRefreshInterval = setInterval(function() {
                var tt = getTimer();
                if (!tt || !tt.active) { renderTimer(); return; }
                var r = getRemaining(tt);
                var el = document.getElementById('tRemaining');
                if (el) el.textContent = fmtDuration(r);
                if (r <= 0) { clearInterval(timerRefreshInterval); timerRefreshInterval = null; renderTimer(); }
            }, 1000);
        }
    } else {
        display.innerHTML = '<div class="t-label">Current Timer</div><div class="t-inactive">No active timer</div>';
        startBtn.style.display = '';
        stopBtn.style.display = 'none';
        if (timerRefreshInterval) { clearInterval(timerRefreshInterval); timerRefreshInterval = null; }
    }
}
document.getElementById('timerStart').addEventListener('click', function() {
    var title = document.getElementById('timerTitle').value.trim();
    if (!title) { alert('Please enter a title for the timer.'); return; }
    var days = parseInt(document.getElementById('timerDays').value) || 0;
    var hours = parseInt(document.getElementById('timerHours').value) || 0;
    var minutes = parseInt(document.getElementById('timerMinutes').value) || 0;
    var totalMs = (days * 86400000) + (hours * 3600000) + (minutes * 60000);
    if (totalMs <= 0) { alert('Please set a duration greater than 0.'); return; }
    var endTime = Date.now() + totalMs;
    var config = { title: title, endTime: endTime, active: true };
    setTimer(config);
    document.getElementById('timerTitle').value = '';
    document.getElementById('timerDays').value = 0;
    document.getElementById('timerHours').value = 0;
    document.getElementById('timerMinutes').value = 0;
    renderTimer();
});
document.getElementById('timerStop').addEventListener('click', function() {
    var t = getTimer();
    if (!t || !t.active) return;
    t.active = false;
    setTimer(t);
    renderTimer();
});
document.getElementById('timerRefresh').addEventListener('click', function() {
    loadTimerFromFB();
});
loadTimerFromFB(function(t) {
    if (t && t.active) {
        var rem = getRemaining(t);
        if (rem <= 0) {
            t.active = false;
            setTimer(t);
        }
    }
    renderTimer();
});
try { localStorage.setItem('bhFromInternal', '1'); } catch(e) {}
var abPlay = document.getElementById('abPlay'), abTrack = document.getElementById('abTrack'), abStatus = document.getElementById('abStatus'), abVol = document.getElementById('abVol');
var aa = new Audio(); aa.volume = 0.05;
try {
    var s = JSON.parse(localStorage.getItem('bhAudio'));
    if (s && s.src) {
        aa.src = s.src;
        if (s.ct > 0) aa.currentTime = s.ct;
        aa.volume = s.vol || 0.05; aa.muted = s.muted || false;
        if (s.playing) aa.play().catch(function(){});
        abTrack.textContent = decodeURIComponent(s.src.split('/').pop().replace(/%20/g,' ')).replace(/\.mp3$/,'');
        abPlay.textContent = s.playing ? '⏸' : '▶';
    }
} catch(e) {}
function as() { try { localStorage.setItem('bhAudio',JSON.stringify({src:aa.src,ct:aa.currentTime,cur:0,vol:aa.volume,playing:!aa.paused,muted:aa.muted})); } catch(e) {} }
aa.addEventListener('play', function(){ abPlay.textContent='⏸'; abStatus.textContent='Playing'; as(); });
aa.addEventListener('pause', function(){ abPlay.textContent='▶'; abStatus.textContent='Paused'; as(); });
aa.addEventListener('timeupdate', as);
abPlay.addEventListener('click', function(){ if(aa.src){ if(aa.paused) aa.play().catch(function(){}); else aa.pause(); }});
abVol.addEventListener('click', function(){ aa.muted=!aa.muted; abVol.textContent=aa.muted?'♪':'♫'; as(); });
setInterval(function(){ if(!aa.paused&&aa.duration) abStatus.textContent=(aa.currentTime/aa.duration*100).toFixed(0)+'%'; },2000);
</script>
</body>
</html>
