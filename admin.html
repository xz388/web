<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrotherHood — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; overflow:hidden; }
        body {
            background:#050508; color:#e8e8f0; font-family:'Inter',sans-serif;
            display:flex; align-items:center; justify-content:center; padding:20px;
            background-image:radial-gradient(ellipse at 30% 20%, rgba(255,215,0,0.03) 0%, transparent 60%),radial-gradient(ellipse at 70% 80%, rgba(180,120,20,0.02) 0%, transparent 60%);
        }
        .card {
            width:100%; max-width:460px; max-height:100vh;
            background:linear-gradient(165deg,#0c0c1e 0%,#080812 50%,#0a0a18 100%);
            border:1px solid rgba(255,215,0,0.08);
            border-radius:28px;
            padding:40px 32px 28px;
            display:flex; flex-direction:column;
            box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(255,215,0,0.02);
            position:relative; overflow:hidden;
        }
        .card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.12), transparent);
        }
        .card::after {
            content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
            background:conic-gradient(from 45deg at 50% 0%, transparent, rgba(255,215,0,0.005), transparent, rgba(180,120,20,0.003), transparent);
            animation:bgSpin 30s linear infinite; pointer-events:none;
        }
        @keyframes bgSpin { 100% { transform:rotate(360deg); } }
        .head { text-align:center; margin-bottom:20px; flex-shrink:0; position:relative; z-index:1; }
        .head .logo {
            font-family:'Orbitron',monospace; font-size:0.45rem; letter-spacing:5px;
            color:#444488; display:block; margin-bottom:4px;
        }
        .head h1 {
            font-family:'Orbitron',monospace; font-size:1.1rem; letter-spacing:4px; margin:2px 0;
            background:linear-gradient(135deg,#ffd700,#b8860b,#ffd700);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            text-shadow:none;
        }
        .head p {
            font-family:'Playfair Display',serif; font-style:italic;
            font-size:0.65rem; color:#555599; letter-spacing:3px; margin-top:2px;
        }

        .menu { display:flex; flex-direction:column; gap:10px; flex-shrink:0; position:relative; z-index:1; }
        .menu-btn {
            display:flex; align-items:center; gap:14px; padding:16px 20px; border-radius:16px;
            border:1px solid rgba(255,255,255,0.03);
            background:rgba(255,255,255,0.01);
            cursor:pointer; transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            text-decoration:none; color:#e8e8f0;
            position:relative; overflow:hidden;
        }
        .menu-btn::before {
            content:''; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.06), transparent);
            opacity:0; transition:opacity 0.4s;
        }
        .menu-btn:hover {
            border-color:rgba(255,215,0,0.12);
            background:rgba(255,215,0,0.02);
            transform:translateX(4px);
            box-shadow:0 8px 30px rgba(0,0,0,0.2);
        }
        .menu-btn:hover::before { opacity:1; }
        .menu-btn .icon {
            font-size:1.2rem; width:38px; height:38px; display:flex;
            align-items:center; justify-content:center; border-radius:12px;
            background:rgba(255,215,0,0.03); border:1px solid rgba(255,215,0,0.05);
            flex-shrink:0; transition:0.3s;
        }
        .menu-btn:hover .icon { background:rgba(255,215,0,0.06); border-color:rgba(255,215,0,0.1); }
        .menu-btn .info { flex:1; }
        .menu-btn .info .t { font-weight:600; font-size:0.85rem; letter-spacing:0.3px; }
        .menu-btn .info .d { font-size:0.62rem; color:#5555aa; margin-top:2px; }
        .menu-btn .arrow { color:#444488; font-size:1rem; transition:0.3s; }
        .menu-btn:hover .arrow { color:#ffd700; transform:translateX(2px); }
        .back-link {
            display:block; text-align:center; margin-top:14px;
            color:#555599; font-size:0.6rem; text-decoration:none;
            transition:0.3s; letter-spacing:1.5px; padding:6px;
        }
        .back-link:hover { color:#ffd700; letter-spacing:2px; }

        .section { display:none; flex-direction:column; flex:1; min-height:0; position:relative; z-index:1; }
        .section.active { display:flex; }
        .section-top {
            display:flex; align-items:center; gap:10px; margin-bottom:14px;
            flex-shrink:0; padding-bottom:12px;
            border-bottom:1px solid rgba(255,215,0,0.04);
        }
        .section-back {
            background:none; border:1px solid rgba(255,255,255,0.03);
            color:#5555aa; cursor:pointer; font-size:0.8rem; transition:0.3s;
            padding:6px 10px; border-radius:8px;
        }
        .section-back:hover { color:#ffd700; border-color:rgba(255,215,0,0.08); background:rgba(255,215,0,0.03); }
        .section-title {
            font-family:'Orbitron',monospace; font-size:0.78rem;
            color:#ffd700; letter-spacing:2px; flex:1; text-align:center;
            text-shadow:0 0 12px rgba(255,215,0,0.06);
        }

        .form-scroll { flex:1; overflow-y:auto; min-height:0; padding-right:6px; }
        .form-scroll::-webkit-scrollbar { width:4px; }
        .form-scroll::-webkit-scrollbar-thumb { background:rgba(255,215,0,0.08); border-radius:10px; }

        label {
            display:block; font-size:0.55rem; color:#5555aa;
            letter-spacing:2px; margin-bottom:4px; text-transform:uppercase; font-weight:600;
        }
        input, textarea {
            width:100%; padding:9px 14px; margin-bottom:8px; border-radius:10px;
            border:1px solid rgba(255,255,255,0.03);
            background:rgba(255,255,255,0.01);
            color:#ddd; font-size:0.78rem; outline:none;
            font-family:'Inter',sans-serif; transition:0.3s;
        }
        input:focus, textarea:focus {
            border-color:rgba(255,215,0,0.15);
            background:rgba(255,215,0,0.02);
            box-shadow:0 0 20px rgba(255,215,0,0.03);
        }
        textarea { resize:none; min-height:36px; max-height:60px; }

        .btn {
            padding:10px 20px; border:none; border-radius:12px; cursor:pointer;
            font-weight:700; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase;
            width:100%; transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            position:relative; overflow:hidden;
        }
        .btn-gold {
            background:linear-gradient(135deg,#ffd700,#b8860b,#ffd700);
            background-size:200% 200%;
            color:#050508; animation:shimmer 4s ease infinite;
        }
        @keyframes shimmer { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
        .btn-gold:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(255,215,0,0.15); }
        .btn-red {
            background:rgba(255,50,50,0.06); color:#ff5555;
            border:1px solid rgba(255,50,50,0.05); margin-top:8px;
        }
        .btn-red:hover { background:rgba(255,50,50,0.12); border-color:rgba(255,50,50,0.1); transform:translateY(-1px); }

        hr { border:none; height:1px; background:linear-gradient(90deg, transparent, rgba(255,215,0,0.04), transparent); margin:10px 0; flex-shrink:0; }

        .note { text-align:center; font-size:0.55rem; color:#5555aa; margin:6px 0 8px; flex-shrink:0; letter-spacing:0.5px; }
        .note a { color:#6666aa; text-decoration:none; border-bottom:1px dotted rgba(255,215,0,0.1); padding-bottom:1px; }
        .note a:hover { color:#ffd700; border-color:rgba(255,215,0,0.3); }

        .upd-item {
            display:flex; align-items:center; gap:8px; padding:8px 12px; margin-bottom:4px;
            border-radius:10px; background:rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.02);
            font-size:0.7rem; transition:0.2s;
        }
        .upd-item:hover { background:rgba(255,255,255,0.02); border-color:rgba(255,215,0,0.04); }
        .upd-item .del {
            flex-shrink:0; width:22px; height:22px; border:none; border-radius:6px;
            background:rgba(255,50,50,0.08); color:#ff4444;
            cursor:pointer; font-size:0.7rem; transition:0.2s; display:flex; align-items:center; justify-content:center;
        }
        .upd-item .del:hover { background:rgba(255,50,50,0.2); transform:scale(1.1); }
        .upd-item .info { flex:1; overflow:hidden; }
        .upd-item .info .t { font-weight:600; color:#ddd; font-size:0.75rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .upd-item .info .d { font-size:0.55rem; color:#5555aa; margin-top:1px; }

        .soon-box { text-align:center; padding:50px 20px; color:#5555aa; }
        .soon-box .big { font-size:2.2rem; display:block; margin-bottom:10px; opacity:0.5; }
        .soon-box .txt { font-size:0.78rem; letter-spacing:1.5px; font-weight:300; }

        .mbar {
            display:flex; align-items:center; gap:10px; margin-top:14px;
            padding:12px 18px; border-radius:14px;
            border:1px solid rgba(255,215,0,0.04);
            background:rgba(255,255,255,0.01);
            backdrop-filter:blur(8px); flex-shrink:0; position:relative; z-index:1;
        }
        .mbar .c {
            background:none; border:1px solid rgba(255,215,0,0.04);
            color:#ffd700; cursor:pointer; font-size:0.9rem;
            width:30px; height:30px; border-radius:8px;
            display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:0.3s;
        }
        .mbar .c:hover { background:rgba(255,215,0,0.06); border-color:rgba(255,215,0,0.1); transform:scale(1.05); }
        .mbar .c.v { color:#5555aa; border-color:rgba(255,255,255,0.02); }
        .mbar .c.v:hover { color:#ffd700; border-color:rgba(255,215,0,0.08); }
        .mbar .info { flex:1; overflow:hidden; }
        .mbar .info .t { font-size:0.62rem; color:#8888aa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .mbar .info .s { font-size:0.5rem; color:#444488; }

        @media (max-width:500px) { .card { padding:28px 18px 20px; } body { padding:12px; } }
    </style>
</head>
<body>
<div class="card">
    <div class="head">
        <span class="logo">B R O T H E R H O O D</span>
        <h1>Dashboard</h1>
        <p>— Control Panel —</p>
    </div>

    <div class="menu" id="menu">
        <a class="menu-btn" href="#" onclick="showSection('updatesSec')">
            <span class="icon">📢</span>
            <span class="info"><span class="t">Updates Manager</span><span class="d">Add, delete, and manage updates</span></span>
            <span class="arrow">→</span>
        </a>
        <a class="menu-btn" href="#" onclick="showSection('soonSec')">
            <span class="icon">🚧</span>
            <span class="info"><span class="t">More Tools</span><span class="d">Coming soon</span></span>
            <span class="arrow">→</span>
        </a>
        <a class="back-link" href="index.html">← Back to Main Page</a>
    </div>

    <div class="section" id="updatesSec">
        <div class="section-top">
            <button class="section-back" onclick="showSection('menu')">←</button>
            <span class="section-title">Updates Manager</span>
        </div>
        <div class="form-scroll">
            <label>Date</label>
            <input type="date" id="adminDate" />
            <label>Title <span style="color:#5555aa;font-weight:400;text-transform:none;letter-spacing:0">(EN)</span></label>
            <input type="text" id="adminTitle" placeholder="e.g. New Event" />
            <label>Description <span style="color:#5555aa;font-weight:400;text-transform:none;letter-spacing:0">(EN)</span></label>
            <textarea id="adminDesc" placeholder="Description in English"></textarea>
            <label>العنوان <span style="color:#5555aa;font-weight:400;text-transform:none;letter-spacing:0">(AR)</span></label>
            <input type="text" id="adminTitleAr" placeholder="مثال: حدث جديد" />
            <label>الوصف <span style="color:#5555aa;font-weight:400;text-transform:none;letter-spacing:0">(AR)</span></label>
            <textarea id="adminDescAr" placeholder="الوصف بالعربية"></textarea>
            <button class="btn btn-gold" id="adminSubmit">Publish</button>
            <hr />
            <div id="adminList"></div>
            <div class="note">5 newest show on main page · <a href="archive.html">Archive</a></div>
            <button class="btn btn-red" id="adminReset">Reset to Defaults</button>
        </div>
    </div>

    <div class="section" id="soonSec">
        <div class="section-top">
            <button class="section-back" onclick="showSection('menu')">←</button>
            <span class="section-title">More Tools</span>
        </div>
        <div class="soon-box"><span class="big">✦</span><div class="txt">More tools coming soon</div></div>
    </div>

    <div class="mbar">
        <button class="c" id="abPlay">▶</button>
        <div class="info"><div class="t" id="abTrack">No track</div><div class="s" id="abStatus">—</div></div>
        <button class="c v" id="abVol">♫</button>
    </div>
</div>

<script>
function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('menu').style.display = id === 'menu' ? 'flex' : 'none';
    if (id !== 'menu') { document.getElementById(id).classList.add('active'); if (id === 'updatesSec') renderAdminList(); }
}

let updatesData;
try { updatesData = JSON.parse(localStorage.getItem('bhUpdates')); } catch(e) {}
if (!updatesData) updatesData = [
    { date:'2026-05-25', title:'Website Launch', desc:'BrotherHood official website is now live.', titleAr:'إطلاق الموقع', descAr:'الموقع الرسمي لـ BrotherHood أصبح متاحاً الآن.' },
    { date:'2026-05-20', title:'New Members Joined', desc:'Welcome Abdulaziz to the group.', titleAr:'انضمام أعضاء جدد', descAr:'مرحباً عبدالعزيز في القروب.' },
    { date:'2026-05-15', title:'Discord Server Upgraded', desc:'New roles, bots, and event channels added.', titleAr:'تطوير سيرفر ديسكورد', descAr:'إضافة رتب جديدة، بوتات، وقنوات فعاليات.' },
    { date:'2026-05-10', title:'YouTube Channel Prep', desc:'Planning content and branding for the channel.', titleAr:'تجهيز قناة يوتيوب', descAr:'تخطيط المحتوى والهوية البصرية للقناة.' }
];

function renderAdminList() {
    const el = document.getElementById('adminList');
    el.innerHTML = updatesData.map((u,i) =>
        `<div class="upd-item"><button class="del" data-idx="${i}">&times;</button><div class="info"><div class="t">${u.title}</div><div class="d">${u.date} ${u.titleAr ? '• '+u.titleAr : ''}</div></div></div>`
    ).join('');
    el.querySelectorAll('.del').forEach(b => b.addEventListener('click', () => {
        const idx = parseInt(b.dataset.idx);
        updatesData.splice(idx,1);
        try { localStorage.setItem('bhUpdates', JSON.stringify(updatesData)); } catch(e) {}
        renderAdminList();
    }));
}
document.getElementById('adminSubmit').addEventListener('click', () => {
    const date = document.getElementById('adminDate').value;
    const title = document.getElementById('adminTitle').value.trim();
    const desc = document.getElementById('adminDesc').value.trim();
    const titleAr = document.getElementById('adminTitleAr').value.trim();
    const descAr = document.getElementById('adminDescAr').value.trim();
    if (!date || !title) return;
    updatesData.unshift({date,title,desc,titleAr,descAr});
    try { localStorage.setItem('bhUpdates', JSON.stringify(updatesData)); } catch(e) {}
    renderAdminList();
    ['adminDate','adminTitle','adminDesc','adminTitleAr','adminDescAr'].forEach(id => document.getElementById(id).value = '');
});
document.getElementById('adminReset').addEventListener('click', () => {
    if (!confirm('Reset all updates to defaults?')) return;
    try { localStorage.removeItem('bhUpdates'); } catch(e) {}
    location.reload();
});

try { localStorage.setItem('bhFromInternal', '1'); } catch(e) {}
const abPlay = document.getElementById('abPlay'), abTrack = document.getElementById('abTrack'), abStatus = document.getElementById('abStatus'), abVol = document.getElementById('abVol');
const aa = new Audio(); aa.volume = 0.05;
try {
    const s = JSON.parse(localStorage.getItem('bhAudio'));
    if (s && s.src) {
        aa.src = s.src;
        if (s.ct > 0) aa.currentTime = s.ct;
        aa.volume = s.vol || 0.05; aa.muted = s.muted || false;
        if (s.playing) aa.play().catch(() => {});
        abTrack.textContent = decodeURIComponent(s.src.split('/').pop().replace(/%20/g,' ')).replace(/\.mp3$/,'');
        abPlay.textContent = s.playing ? '⏸' : '▶';
    }
} catch(e) {}
function as() { try { localStorage.setItem('bhAudio', JSON.stringify({src:aa.src,ct:aa.currentTime,cur:0,vol:aa.volume,playing:!aa.paused,muted:aa.muted})); } catch(e) {} }
aa.addEventListener('play', () => { abPlay.textContent = '⏸'; abStatus.textContent = 'Playing'; as(); });
aa.addEventListener('pause', () => { abPlay.textContent = '▶'; abStatus.textContent = 'Paused'; as(); });
aa.addEventListener('timeupdate', as);
abPlay.addEventListener('click', () => { if (aa.src) { if (aa.paused) aa.play().catch(() => {}); else aa.pause(); } });
abVol.addEventListener('click', () => { aa.muted = !aa.muted; abVol.textContent = aa.muted ? '♪' : '♫'; as(); });
setInterval(() => { if (!aa.paused && aa.duration) abStatus.textContent = (aa.currentTime/aa.duration*100).toFixed(0)+'%'; }, 2000);
</script>
</body>
</html>
