<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BrotherHood — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html{color-scheme:dark}html,body{overflow-x:hidden;overflow-y:auto;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#050510}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#ffd700,#b8860b);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#ffe44d,#d4a800)}
body{background:#050510;color:#eee;font-family:'Inter',sans-serif}
.page{
  width:100%;min-height:100vh;
  background:linear-gradient(170deg,#080816 0%,#020208 40%,#0c0c1e 70%,#060612 100%);
  display:flex;align-items:flex-start;justify-content:center;padding:30px 40px;position:relative
}
.page::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 15% 10%,rgba(255,215,0,.08)0%,transparent 45%),
    radial-gradient(ellipse at 85% 90%,rgba(255,180,50,.05)0%,transparent 45%),
    radial-gradient(ellipse at 50% 50%,rgba(255,215,0,.02)0%,transparent 70%)
}
canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
.mg{
  position:absolute;width:600px;height:600px;border-radius:50%;z-index:0;pointer-events:none;
  transform:translate(-50%,-50%);transition:opacity .15s;
  background:radial-gradient(circle,rgba(255,215,0,.07)0%,rgba(255,215,0,.02)20%,transparent 55%);filter:blur(12px)
}
.inner{position:relative;z-index:1;width:100%;max-width:1060px;display:flex;flex-direction:column}
.hd{
  display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-shrink:0;
  padding:14px 22px;border-radius:12px;
  background:rgba(0,0,0,.35);border:1px solid rgba(255,215,0,.1);
  backdrop-filter:blur(12px);position:relative;animation:fd .4s ease both;
  box-shadow:0 0 40px rgba(255,215,0,.03)
}
@keyframes fd{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.hd a{color:#6868b0;text-decoration:none;font-size:.75rem;transition:.25s;letter-spacing:1.5px;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.025);font-weight:600;white-space:nowrap}
.hd a:hover{color:#ffd700;background:rgba(255,215,0,.03);border-color:rgba(255,215,0,.08);box-shadow:0 0 25px rgba(255,215,0,.03)}
.hd .tg{flex:1;text-align:center}
.hd .tg h1{font-family:'Orbitron',monospace;font-size:1.1rem;color:#ffd700;letter-spacing:4px;text-shadow:0 0 50px rgba(255,215,0,.15),0 0 100px rgba(255,215,0,.05)}
.hd .tg span{display:block;font-size:.55rem;color:#5555aa;letter-spacing:6px;font-weight:400;margin-top:3px}

/* ═══ SPOTLIGHT ═══ */
.pst::before{content:'';position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(ellipse,rgba(255,215,0,.06)0%,rgba(255,215,0,.02)20%,transparent 60%);pointer-events:none;z-index:-1;animation:sp 3s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.5;transform:translateX(-50%)scale(1)}50%{opacity:1;transform:translateX(-50%)scale(1.1)}}

/* ═══ PODIUM ═══ */
.pst{display:flex;align-items:flex-end;justify-content:center;gap:40px;margin-bottom:16px;flex-shrink:0;position:relative}
.pc{flex:1;max-width:260px;position:relative;cursor:pointer;animation:pr .6s ease both}
.pc:nth-child(1){animation-delay:.25s}
.pc:nth-child(2){animation-delay:.1s}
.pc:nth-child(3){animation-delay:.18s}
@keyframes pr{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.pb{position:relative;width:100%;border-radius:16px 16px 0 0;display:flex;flex-direction:column;align-items:center;box-shadow:0 10px 60px rgba(0,0,0,.5)}
.p1 .pb{background:linear-gradient(180deg,#0d0a00 0%,#1a1300 15%,#2a2000 50%,#1a1300 85%,#0d0a00 100%);border:1px solid rgba(255,215,0,.12);border-bottom:none}
.p1 .pb .glow{position:absolute;inset:-1px;border-radius:16px 16px 0 0;pointer-events:none;border:1px solid rgba(255,215,0,.2);box-shadow:0 0 50px rgba(255,215,0,.06),inset 0 0 50px rgba(255,215,0,.03);animation:ng 2.5s ease-in-out infinite}
@keyframes ng{0%,100%{opacity:.4;box-shadow:0 0 30px rgba(255,215,0,.03),inset 0 0 30px rgba(255,215,0,.015)}50%{opacity:1;box-shadow:0 0 70px rgba(255,215,0,.08),inset 0 0 60px rgba(255,215,0,.04)}}

/* ═══ METALLIC SHIMMER ON #1 ═══ */
.p1 .pb .shimmer{position:absolute;inset:0;border-radius:16px 16px 0 0;pointer-events:none;overflow:hidden;z-index:1}
.p1 .pb .shimmer::before{content:'';position:absolute;top:-50%;left:-100%;width:300%;height:200%;background:linear-gradient(90deg,transparent 0%,rgba(255,215,0,.03) 25%,rgba(255,215,0,.06) 40%,rgba(255,255,255,.02) 45%,transparent 50%);transform:rotate(25deg);animation:sh 4s ease-in-out infinite}
@keyframes sh{0%{transform:rotate(25deg)translateX(-60%)}40%{transform:rotate(25deg)translateX(60%)}100%{transform:rotate(25deg)translateX(60%)}}

/* ═══ CROWN ON #1 ═══ */
.p1 .pb .crn{position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:2.8rem;z-index:3;filter:drop-shadow(0 0 20px rgba(255,215,0,.4));animation:crb 2s ease-in-out infinite}
@keyframes crb{0%,100%{transform:translateX(-50%)translateY(0)}50%{transform:translateX(-50%)translateY(-6px)}}

/* ═══ CINEMATIC SMOKE/FOG ═══ */
.pst::after{content:'';position:absolute;bottom:0;left:-10%;right:-10%;height:120px;background:radial-gradient(ellipse at 50% 100%,rgba(255,215,0,.025)0%,transparent 60%);pointer-events:none;filter:blur(30px);animation:fg 6s ease-in-out infinite}
@keyframes fg{0%,100%{opacity:.6;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.2)}}

.p2 .pb{background:linear-gradient(180deg,#0a0a12 0%,#12121e 15%,#1e1e2e 50%,#12121e 85%,#0a0a12 100%);border:1px solid rgba(192,192,192,.05);border-bottom:none}
.p2 .pb .glow{position:absolute;inset:-1px;border-radius:16px 16px 0 0;pointer-events:none;border:1px solid rgba(192,192,192,.07)}
.p3 .pb{background:linear-gradient(180deg,#0d0806 0%,#1a100e 15%,#261a16 50%,#1a100e 85%,#0d0806 100%);border:1px solid rgba(205,127,50,.05);border-bottom:none}
.p3 .pb .glow{position:absolute;inset:-1px;border-radius:16px 16px 0 0;pointer-events:none;border:1px solid rgba(205,127,50,.07)}
.p1 .pb .cr{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:16px 16px 0 0;z-index:2}
.p1 .pb .cr::before{content:'';position:absolute;top:0;left:0;width:70px;height:70px;border-top:2px solid rgba(255,215,0,.4);border-left:2px solid rgba(255,215,0,.4)}
.p1 .pb .cr::after{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-top:2px solid rgba(255,215,0,.4);border-right:2px solid rgba(255,215,0,.4)}
.pb .ff{position:absolute;bottom:-12px;left:0;right:0;height:12px;background:inherit;border-radius:0 0 8px 8px;filter:brightness(.85)}
.pb .ff::after{content:'';position:absolute;bottom:0;left:4px;right:4px;height:4px;background:rgba(0,0,0,.2);border-radius:0 0 8px 8px;filter:blur(2px)}
.pb .sf{position:absolute;top:0;right:-8px;width:8px;height:100%;border-radius:0 8px 8px 0;filter:brightness(.8)}
.p1 .pb .sf{background:#1a1300}
.p2 .pb .sf{background:#12121e}
.p3 .pb .sf{background:#1a100e}
.pb .sh{position:absolute;bottom:-16px;left:8%;right:8%;height:14px;background:radial-gradient(ellipse at 50% 50%,rgba(0,0,0,.4)0%,transparent 70%);filter:blur(6px);pointer-events:none}
.px{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:32px 18px 18px;gap:6px;text-align:center;width:100%}
.p1 .px{padding:36px 18px 20px}
.px .pm{font-size:2.8rem;line-height:1.1;filter:drop-shadow(0 0 20px rgba(255,215,0,.12));animation:bob 3s ease-in-out infinite}
.p1 .px .pm{font-size:3.4rem;filter:drop-shadow(0 0 30px rgba(255,215,0,.18));animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.px .pt{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:10px;font-weight:900;margin-top:4px}
.p1 .px .pt{color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,.12)}
.p2 .px .pt{color:#c0c0c0;text-shadow:0 0 15px rgba(192,192,192,.06)}
.p3 .px .pt{color:#cd7f32;text-shadow:0 0 15px rgba(205,127,50,.06)}
.px .pn{font-weight:800;font-size:1.3rem;color:#f0f0ff;letter-spacing:.3px;margin-top:8px}
.px .pn .ar{display:block;font-size:.85rem;color:#6060b0;font-weight:500;margin-top:3px}
.px .ps{display:flex;gap:8px;justify-content:center;width:100%;margin-top:6px}
.px .ps:first-of-type{margin-top:14px}
.px .ps span{
  font-size:.6rem;color:#8888bb;display:flex;align-items:center;gap:4px;
  padding:5px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.015);background:rgba(0,0,0,.2);font-weight:600;backdrop-filter:blur(4px);white-space:nowrap
}
.p1 .px .ps span{color:#ffd700;border-color:rgba(255,215,0,.05);background:rgba(255,215,0,.025)}
.px .ps .nm{font-family:'Orbitron',monospace;font-weight:700;font-size:.7rem;color:#aaaadd}
.p1 .px .ps .nm{color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,.06)}
.sl{width:100%;text-align:center;padding:10px 0 8px;font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:8px;font-weight:700;text-transform:uppercase}
.p1 .sl{color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.06);background:linear-gradient(0deg,rgba(255,215,0,.025),transparent)}
.p2 .sl{color:#c0c0c0}
.p3 .sl{color:#cd7f32}
.pbse{width:100%;height:6px;border-radius:0 0 8px 8px;flex-shrink:0;background:linear-gradient(180deg,rgba(255,255,255,.015),rgba(0,0,0,.1));border:1px solid rgba(255,255,255,.015);border-top:none;position:relative}
.p1 .pbse{background:linear-gradient(180deg,rgba(255,215,0,.015),rgba(0,0,0,.05));border-color:rgba(255,215,0,.03)}
.pbse::before{content:'';position:absolute;bottom:-3px;left:5%;right:5%;height:5px;background:rgba(0,0,0,.12);border-radius:50%;filter:blur(3px)}

/* ═══ LIST ═══ */
.lw{padding:2px 4px 2px 0}
.pcd{
  display:flex;align-items:center;gap:18px;
  padding:16px 22px;margin-bottom:7px;border-radius:12px;
  border:1px solid rgba(255,255,255,.008);
  background:rgba(0,0,0,.18);
  transition:all .3s ease;
  position:relative;overflow:hidden;
  backdrop-filter:blur(4px);cursor:pointer;
  animation:cs .5s ease both
}
.pcd:nth-child(1){animation-delay:.03s}
.pcd:nth-child(2){animation-delay:.07s}
.pcd:nth-child(3){animation-delay:.11s}
.pcd:nth-child(4){animation-delay:.15s}
.pcd:nth-child(5){animation-delay:.19s}
@keyframes cs{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.pcd:hover{transform:translateX(6px);border-color:rgba(255,215,0,.04);background:rgba(255,215,0,.006);box-shadow:0 0 30px rgba(255,215,0,.025)}
.pcd::after{content:'';position:absolute;left:0;top:8px;bottom:8px;width:2px;border-radius:2px;opacity:0;transition:opacity .3s;background:#ffd700;box-shadow:0 0 12px rgba(255,215,0,.1)}
.pcd:hover::after{opacity:.5}
.rb{width:50px;height:50px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;background:rgba(0,0,0,.25);border:1px solid rgba(255,215,0,.025);color:#5555aa;transition:.3s}
.pcd:hover .rb{color:#ffd700;border-color:rgba(255,215,0,.04);box-shadow:0 0 25px rgba(255,215,0,.025)}
.pi{flex:1;min-width:0}
.pi .nm{font-weight:700;font-size:1.05rem;color:#ddd;letter-spacing:.2px}
.pi .ar{font-size:.75rem;color:#4a4aaa;font-weight:500;margin-left:6px}
.pi .sr{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}
.sc{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;color:#6a6aaa;padding:5px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.008);background:rgba(0,0,0,.1);font-weight:600}
.sc.cp{color:#ffd700;border-color:rgba(255,215,0,.025)}
.sc.mv{color:#b084e0;border-color:rgba(192,132,252,.025)}
.sc.mr{color:#60a0ff;border-color:rgba(96,176,255,.025)}
.sc .nm{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700}
.emp{text-align:center;padding:70px 20px;color:#404080}.emp .bg{font-size:3rem;display:block;margin-bottom:12px;opacity:.5}

/* ═══ MODAL ═══ */
.mo{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);align-items:center;justify-content:center;padding:20px}
.mo.sh{display:flex}
.mb{background:linear-gradient(170deg,#0c0c1e,#080812);border:1px solid rgba(255,215,0,.06);border-radius:18px;padding:40px 36px 32px;max-width:520px;width:100%;position:relative;animation:mi .35s ease}
@keyframes mi{from{opacity:0;transform:scale(.9)translateY(12px)}to{opacity:1;transform:scale(1)translateY(0)}}
.mc{position:absolute;top:14px;right:16px;background:none;border:none;color:#5050aa;font-size:1.5rem;cursor:pointer;transition:.3s;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.mc:hover{color:#ffd700;transform:rotate(90deg)}
.mb h2{font-family:'Orbitron',monospace;font-size:1.4rem;color:#ffd700;letter-spacing:2px;margin-bottom:4px;text-align:center}
.mb .sn{text-align:center;font-size:.85rem;color:#4a4a8a;margin-bottom:20px}
.ms{display:flex;flex-direction:column;gap:10px}
.mr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-radius:10px;background:rgba(255,255,255,.005);border:1px solid rgba(255,255,255,.01)}
.mr .lb{font-size:.85rem;color:#5a5a9a;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.mr .vl{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700}
.mr .vl.gd{color:#ffd700}.mr .vl.pu{color:#b084e0}.mr .vl.bl{color:#60a0ff}
.md{height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.03),transparent);margin:8px 0}
.mmx{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
.mi2{text-align:center;padding:14px;border-radius:8px;background:rgba(255,255,255,.003);border:1px solid rgba(255,255,255,.008)}
.mi2 .lb{font-size:.55rem;color:#4848aa;text-transform:uppercase;letter-spacing:1px}
.mi2 .vl{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:#7a7abb;margin-top:3px}
.mrt{display:table;margin:0 auto 14px;padding:6px 26px;border-radius:8px;font-size:.65rem;letter-spacing:2px;font-weight:600;font-family:'Orbitron',monospace;background:rgba(255,215,0,.04);color:#ffd700;border:1px solid rgba(255,215,0,.08)}
.mtp{text-align:center;margin-top:10px;font-size:.55rem;color:#3a3a7a}

/* ═══ MUSIC ═══ */
.music{margin-top:14px;padding:12px 18px;border-radius:12px;border:1px solid rgba(255,215,0,.04);background:rgba(0,0,0,.25);backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;animation:fu .5s ease .5s both;flex-shrink:0}
.music .in{flex:1;overflow:hidden}
.music .in .tn{font-size:.65rem;color:#8888bb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music .in .ts{font-size:.5rem;color:#4848aa;margin-top:2px}
.music .ct{background:none;border:1px solid rgba(255,215,0,.04);color:#ffd700;cursor:pointer;font-size:.95rem;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.music .ct:hover{background:rgba(255,215,0,.05);border-color:rgba(255,215,0,.08)}
.music .ct.vl{color:#5a5aaa;border-color:rgba(255,255,255,.025)}
.music .ct.vl:hover{color:#ffd700}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:820px){
  .page{padding:0 14px}
  .pst{gap:22px}
  .px{padding:24px 12px 14px !important}
  .px .pm{font-size:2rem}.p1 .px .pm{font-size:2.4rem}
  .px .pn{font-size:1rem}.px .pt{font-size:.5rem}
  .px .ps span{font-size:.5rem;padding:4px 12px}
  .pcd{padding:12px 16px}
  .rb{width:42px;height:42px;font-size:1rem}
  .pi .nm{font-size:.9rem}
  .p1 .pb .cr::before,.p1 .pb .cr::after{width:50px;height:50px}
}
@media(max-width:450px){
  .page{padding:0 8px}
  .hd{gap:6px;padding:10px 12px;flex-wrap:wrap;justify-content:center}
  .hd a{font-size:.55rem;padding:4px 8px}
  .hd .tg{width:100%;text-align:center}
  .hd .tg h1{font-size:.7rem;letter-spacing:2px}
  .hd .tg span{font-size:.45rem;letter-spacing:3px}
  .pst{flex-direction:column;align-items:center;gap:20px}
  .pc{max-width:220px;width:100%}
  .pc:nth-child(1){order:2}
  .pc:nth-child(2){order:1}
  .pc:nth-child(3){order:3}
  .px{padding:18px 10px 12px !important}
  .px .pm{font-size:1.6rem}.p1 .px .pm{font-size:1.8rem}
  .px .pn{font-size:.85rem}.px .pt{font-size:.4rem;letter-spacing:4px}
  .px .ps span{font-size:.4rem}
  .pcd{gap:10px;padding:10px 14px}
  .rb{width:36px;height:36px;font-size:.85rem}
  .pi .nm{font-size:.8rem}
  .p1 .pb .cr::before,.p1 .pb .cr::after{width:35px;height:35px}
}
</style>
</head>
<body>
<div class="page" id="page">
  <div class="mg" id="mg"></div>
  <canvas id="particles"></canvas>
  <div class="inner">
    <div class="hd">
      <a href="index.html">← Home</a>
      <a href="world-records.html">World Records</a>
      <div class="tg">
        <h1>✦ Leaderboard ✦</h1>
        <span>BrotherHood — Rankings</span>
      </div>
    </div>
    <div class="pst" id="pst"></div>
    <div class="lw" id="lw"></div>
    <div class="music">
      <button class="ct" id="abPlay">▶</button>
      <div class="in">
        <div class="tn" id="abTrack">No track</div>
        <div class="ts" id="abStatus">—</div>
      </div>
      <button class="ct vl" id="abVol">♫</button>
    </div>
  </div>
</div>
<div class="mo" id="mo"><div class="mb"><button class="mc" id="mc">✕</button><div id="mcon"></div></div></div>

<script>
var DD=[{name:'Sl6an',nameAr:'سلطان',champion:3,mvp:2,goals:20,assists:15,saves:8},{name:'Raad',nameAr:'رعد',champion:2,mvp:3,goals:18,assists:12,saves:6},{name:'Samer',nameAr:'سامر',champion:2,mvp:2,goals:15,assists:10,saves:7},{name:'Rayan',nameAr:'ريان',champion:1,mvp:2,goals:12,assists:8,saves:5},{name:'Abdullah',nameAr:'عبدالله',champion:1,mvp:1,goals:10,assists:6,saves:4},{name:'Moayad',nameAr:'مؤيد',champion:0,mvp:1,goals:8,assists:5,saves:3},{name:'Abdulaziz',nameAr:'عبدالعزيز',champion:0,mvp:0,goals:6,assists:4,saves:2}];
function gd(){try{var d=JSON.parse(localStorage.getItem('bhLeaderboard'));if(d&&d.length)return d}catch(e){}try{localStorage.setItem('bhLeaderboard',JSON.stringify(DD))}catch(e){}return DD.slice()}
function mr(p){return(p.goals||0)*100+(p.assists||0)*50+(p.saves||0)*50}
function rp(pl){var s=pl.slice().sort(function(a,b){if(a.champion!==b.champion)return b.champion-a.champion;if(a.mvp!==b.mvp)return b.mvp-a.mvp;var ma=mr(a),mb=mr(b);return ma!==mb?mb-ma:0});var r=[],cr=1;for(var i=0;i<s.length;i++){if(i>0&&!(s[i].champion===s[i-1].champion&&s[i].mvp===s[i-1].mvp&&mr(s[i])===mr(s[i-1])))cr=i+1;r.push({player:s[i],rank:cr})}return r}
var ML=['','🥇','🥈','🥉'];
