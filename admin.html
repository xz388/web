<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrotherHood — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&family=Playfair+Display:ital@0;1&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; overflow:hidden; }
        body {
            background:#050508; color:#e8e8f0; font-family:'Inter',sans-serif;
            display:flex; align-items:center; justify-content:center; padding:20px;
            background-image:radial-gradient(ellipse at 30% 20%, rgba(255,215,0,0.04) 0%, transparent 60%),radial-gradient(ellipse at 70% 80%, rgba(180,120,20,0.02) 0%, transparent 60%);
        }
        .scanline {
            position:fixed; inset:0; pointer-events:none; z-index:9999;
            background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px);
        }
        .card {
            width:100%; max-width:520px; max-height:100vh;
            background:linear-gradient(165deg,#0c0c1e 0%,#080812 50%,#0a0a18 100%);
            border:1px solid rgba(255,215,0,0.08);
            border-radius:28px;
            padding:44px 36px 32px;
            display:flex; flex-direction:column;
            box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(255,215,0,0.02);
            position:relative; overflow:hidden;
        }
        .card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.12), transparent);
        }
        .card::after {
            content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
            background:conic-gradient(from 45deg at 50% 0%, transparent, rgba(255,215,0,0.006), transparent, rgba(180,120,20,0.003), transparent);
            animation:bgSpin 30s linear infinite; pointer-events:none;
        }
        @keyframes bgSpin { 100% { transform:rotate(360deg); } }
        .head { text-align:center; margin-bottom:20px; flex-shrink:0; position:relative; z-index:1; }
        .head .logo {
            font-family:'Orbitron',monospace; font-size:0.45rem; letter-spacing:5px;
            color:#444488; display:block; margin-bottom:4px;
        }
        .head h1 {
            font-family:'Orbitron',monospace; font-size:1.1rem; letter-spacing:4px; margin:2px 0;
            background:linear-gradient(135deg,#ffd700,#b8860b,#ffd700);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            text-shadow:none;
        }
        .head p {
            font-family:'Playfair Display',serif; font-style:italic;
            font-size:0.65rem; color:#555599; letter-spacing:3px; margin-top:2px;
        }
        .menu { display:flex; flex-direction:column; gap:10px; flex-shrink:0; position:relative; z-index:1; }
        .menu-btn {
            display:flex; align-items:center; gap:14px; padding:16px 20px; border-radius:16px;
            border:1px solid rgba(255,255,255,0.03);
            background:rgba(255,255,255,0.01);
            cursor:pointer; transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            text-decoration:none; color:#e8e8f0;
            position:relative; overflow:hidden;
        }
        .menu-btn::before {
            content:''; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent, rgba(255,215,0,0.06), transparent);
            opacity:0; transition:opacity 0.4s;
        }
        .menu-btn:hover {
            border-color:rgba(255,215,0,0.12);
            background:rgba(255,215,0,0.02);
            transform:translateX(4px);
            box-shadow:0 8px 30px rgba(0,0,0,0.2);
        }
        .menu-btn:hover::before { opacity:1; }
        .menu-btn .icon {
            font-size:1.2rem; width:38px; height:38px; display:flex;
            align-items:center; justify-content:center; border-radius:12px;
            background:rgba(255,215,0,0.04); border:1px solid rgba(255,215,0,0.06);
            flex-shrink:0; transition:0.3s;
        }
        .menu-btn:hover .icon { background:rgba(255,215,0,0.08); border-color:rgba(255,215,0,0.12); transform:scale(1.05); }
        .menu-btn .info { flex:1; }
        .menu-btn .info .t { font-weight:600; font-size:0.85rem; letter-spacing:0.3px; }
        .menu-btn .info .d { font-size:0.62rem; color:#5555aa; margin-top:2px; }
        .menu-btn .arrow { color:#444488; font-size:1rem; transition:0.3s; }
        .menu-btn:hover .arrow { color:#ffd700; transform:translateX(2px); }
        .back-link {
            display:block; text-align:center; margin-top:14px;
            color:#555599; font-size:0.6rem; text-decoration:none;
            transition:0.3s; letter-spacing:1.5px; padding:6px;
        }
        .back-link:hover { color:#ffd700; letter-spacing:2px; }
        .mbar {
            display:flex; align-items:center; gap:10px; margin-top:14px;
            padding:12px 18px; border-radius:14px;
            border:1px solid rgba(255,215,0,0.04);
            background:rgba(255,255,255,0.01);
            backdrop-filter:blur(8px); flex-shrink:0; position:relative; z-index:1;
        }
        .mbar .c {
            background:none; border:1px solid rgba(255,215,0,0.04);
            color:#ffd700; cursor:pointer; font-size:0.9rem;
            width:30px; height:30px; border-radius:8px;
            display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:0.3s;
        }
        .mbar .c:hover { background:rgba(255,215,0,0.06); border-color:rgba(255,215,0,0.1); transform:scale(1.05); }
        .mbar .c.v { color:#5555aa; border-color:rgba(255,255,255,0.02); }
        .mbar .c.v:hover { color:#ffd700; border-color:rgba(255,215,0,0.08); }
        .mbar .info { flex:1; overflow:hidden; }
        .mbar .info .t { font-size:0.62rem; color:#8888aa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .mbar .info .s { font-size:0.5rem; color:#444488; }
        @media (max-width:500px) { .card { padding:28px 18px 20px; } body { padding:12px; } }
    </style>
</head>
<body>
<div class="scanline"></div>
<div class="card">
    <div class="head">
        <span class="logo">B R O T H E R H O O D</span>
        <h1>Dashboard</h1>
        <p>— Control Panel —</p>
    </div>
    <div class="menu">
        <a class="menu-btn" href="admin-updates.html">
            <span class="icon">📢</span>
            <span class="info"><span class="t">Updates Manager</span><span class="d">Add, delete, and manage updates</span></span>
            <span class="arrow">→</span>
        </a>
        <a class="menu-btn" href="admin-poll.html">
            <span class="icon">📊</span>
            <span class="info"><span class="t">Poll Manager</span><span class="d">Create and manage votes</span></span>
            <span class="arrow">→</span>
        </a>
        <a class="menu-btn" href="admin-lb.html">
            <span class="icon">🏆</span>
            <span class="info"><span class="t">Leaderboard Manager</span><span class="d">Edit player stats and rankings</span></span>
            <span class="arrow">→</span>
        </a>
        <a class="back-link" href="index.html">← Back to Main Page</a>
    </div>
    <div class="mbar">
        <button class="c" id="abPlay">▶</button>
        <div class="info"><div class="t" id="abTrack">No track</div><div class="s" id="abStatus">—</div></div>
        <button class="c v" id="abVol">♫</button>
    </div>
</div>
<script>
try { localStorage.setItem('bhFromInternal', '1'); } catch(e) {}
var abPlay = document.getElementById('abPlay'), abTrack = document.getElementById('abTrack'), abStatus = document.getElementById('abStatus'), abVol = document.getElementById('abVol');
var aa = new Audio(); aa.volume = 0.05;
try {
    var s = JSON.parse(localStorage.getItem('bhAudio'));
    if (s && s.src) {
        aa.src = s.src;
        if (s.ct > 0) aa.currentTime = s.ct;
        aa.volume = s.vol || 0.05; aa.muted = s.muted || false;
        if (s.playing) aa.play().catch(function(){});
        abTrack.textContent = decodeURIComponent(s.src.split('/').pop().replace(/%20/g,' ')).replace(/\.mp3$/,'');
        abPlay.textContent = s.playing ? '⏸' : '▶';
    }
} catch(e) {}
function as() { try { localStorage.setItem('bhAudio',JSON.stringify({src:aa.src,ct:aa.currentTime,cur:0,vol:aa.volume,playing:!aa.paused,muted:aa.muted})); } catch(e) {} }
aa.addEventListener('play', function(){ abPlay.textContent='⏸'; abStatus.textContent='Playing'; as(); });
aa.addEventListener('pause', function(){ abPlay.textContent='▶'; abStatus.textContent='Paused'; as(); });
aa.addEventListener('timeupdate', as);
abPlay.addEventListener('click', function(){ if(aa.src){ if(aa.paused) aa.play().catch(function(){}); else aa.pause(); }});
abVol.addEventListener('click', function(){ aa.muted=!aa.muted; abVol.textContent=aa.muted?'♪':'♫'; as(); });
setInterval(function(){ if(!aa.paused&&aa.duration) abStatus.textContent=(aa.currentTime/aa.duration*100).toFixed(0)+'%'; },2000);
</script>
</body>
</html>
