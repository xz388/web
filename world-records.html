<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BrotherHood — World Records</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html{color-scheme:dark}html,body{overflow-x:hidden;overflow-y:auto;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#050510}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#ffd700,#b8860b);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#ffe44d,#d4a800)}
body{background:#050510;color:#eee;font-family:'Inter',sans-serif}

/* ═══ SCANLINE OVERLAY ═══ */
.scanlines::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}.scanlines::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9997;background:radial-gradient(ellipse at 50% 50%,transparent 0%,rgba(5,5,16,.4) 100%)}

.page{
  width:100%;min-height:100vh;
  background:linear-gradient(170deg,#080816 0%,#020208 40%,#0c0c1e 70%,#060612 100%);
  display:flex;align-items:flex-start;justify-content:center;padding:30px 40px;position:relative
}
.page::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 15% 10%,rgba(255,215,0,.08)0%,transparent 45%),
    radial-gradient(ellipse at 85% 90%,rgba(255,180,50,.05)0%,transparent 45%),
    radial-gradient(ellipse at 50% 50%,rgba(255,215,0,.02)0%,transparent 70%)
}
.conic-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:conic-gradient(from 0deg at 50% 50%,rgba(255,215,0,.015),rgba(255,180,50,.008),rgba(100,80,200,.008),rgba(255,215,0,.015));
  animation:spin 30s linear infinite;filter:blur(80px)
}
@keyframes spin{to{transform:rotate(360deg)}}
canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
.mg{
  position:fixed;width:600px;height:600px;border-radius:50%;z-index:1;pointer-events:none;
  transform:translate(-50%,-50%);transition:opacity .15s;
  background:radial-gradient(circle,rgba(255,215,0,.07)0%,rgba(255,215,0,.02)20%,transparent 55%);filter:blur(12px)
}
.inner{position:relative;z-index:2;width:100%;max-width:1100px;display:flex;flex-direction:column}

/* ═══ HEADER ═══ */
.hd{
  display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-shrink:0;
  padding:14px 22px;border-radius:12px;
  background:rgba(0,0,0,.35);border:1px solid rgba(255,215,0,.1);
  backdrop-filter:blur(12px);position:relative;animation:fd .4s ease both;
  box-shadow:0 0 40px rgba(255,215,0,.03)
}
@keyframes fd{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.hd a{color:#6868b0;text-decoration:none;font-size:.75rem;transition:.25s;letter-spacing:1.5px;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.025);font-weight:600;white-space:nowrap}
.hd a:hover{color:#ffd700;background:rgba(255,215,0,.03);border-color:rgba(255,215,0,.08);box-shadow:0 0 25px rgba(255,215,0,.03)}
.hd .tg{flex:1;text-align:center}
.hd .tg h1{font-family:'Orbitron',monospace;font-size:1.1rem;color:#ffd700;letter-spacing:4px;text-shadow:0 0 50px rgba(255,215,0,.15),0 0 100px rgba(255,215,0,.05)}
.hd .tg span{display:block;font-size:.55rem;color:#5555aa;letter-spacing:6px;font-weight:400;margin-top:3px}

/* ═══ SUBTITLE ═══ */
.st{text-align:center;margin-bottom:28px;animation:fd .4s ease .1s both}
.st .q{font-family:'Playfair Display',serif;font-size:1.6rem;font-style:italic;color:rgba(255,215,0,.12);letter-spacing:2px}
.st .q span{color:rgba(255,215,0,.25)}

/* ═══ RECORDS GRID ═══ */
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:20px}
.rc{
  position:relative;border-radius:14px;padding:0;overflow:hidden;
  animation:rcf .6s ease both;
  border:1px solid rgba(255,215,0,.06);
  background:rgba(0,0,0,.2);
  backdrop-filter:blur(12px);
  transition:all .4s ease;
  display:flex;flex-direction:column
}
.rc:nth-child(1){animation-delay:.05s}
.rc:nth-child(2){animation-delay:.12s}
.rc:nth-child(3){animation-delay:.19s}
.rc:nth-child(4){animation-delay:.26s}
.rc:nth-child(5){animation-delay:.33s}
@keyframes rcf{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.rc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0;transition:opacity .4s}
.rc:hover::before{opacity:1}
.rc::after{content:'';position:absolute;inset:0;border-radius:14px;pointer-events:none;border:1px solid transparent;transition:all .4s}
.rc:hover::after{border-color:rgba(255,215,0,.12);box-shadow:0 0 40px rgba(255,215,0,.04)}
.rc:hover{transform:translateY(-3px)}
.rc .gl{position:absolute;inset:0;border-radius:14px;pointer-events:none;opacity:0;transition:opacity .5s}
.rc:hover .gl{opacity:1;background:radial-gradient(ellipse at 50% 0%,rgba(255,215,0,.04),transparent 60%)}
.rch{
  display:flex;align-items:center;gap:12px;padding:16px 20px 10px;position:relative;z-index:1
}
.rch .ic{font-size:1.6rem;flex-shrink:0;filter:drop-shadow(0 0 12px rgba(255,215,0,.1))}
.rch .ci{flex:1}
.rch .ci .en{font-size:.7rem;color:#9999cc;letter-spacing:.5px;font-weight:600;text-transform:uppercase}
.rch .ci .ar{font-size:.6rem;color:#5555aa;margin-top:1px;direction:rtl}
.rc .vl{
  font-family:'Orbitron',monospace;font-size:2.8rem;font-weight:900;color:#ffd700;letter-spacing:2px;
  padding:0 20px 4px;position:relative;z-index:1;
  text-shadow:0 0 40px rgba(255,215,0,.1),0 0 80px rgba(255,215,0,.05)
}
.rc .pl{font-size:.85rem;color:#c0c0e8;padding:6px 20px 18px;position:relative;z-index:1;font-weight:500}
.rc .pl .nm{color:#ffd700;font-weight:700;text-shadow:0 0 20px rgba(255,215,0,.06)}
.rc .pl .sp{color:#5555aa;margin:0 4px}
.rc .ac{position:absolute;right:14px;bottom:14px;font-size:2rem;opacity:.06;z-index:0;font-family:'Playfair Display',serif;pointer-events:none}

.emp{text-align:center;padding:80px 20px;color:#404080;animation:fd .5s ease both}
.emp .bg{font-size:4rem;display:block;margin-bottom:16px;opacity:.4}
.emp .tx{font-size:1.1rem;letter-spacing:2px}
.emp .sx{font-size:.75rem;color:#3a3a7a;margin-top:8px}

/* ═══ MUSIC ═══ */
.music{margin-top:14px;padding:12px 18px;border-radius:12px;border:1px solid rgba(255,215,0,.04);background:rgba(0,0,0,.25);backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;animation:fu .5s ease .5s both;flex-shrink:0}
.music .in{flex:1;overflow:hidden}
.music .in .tn{font-size:.65rem;color:#8888bb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music .in .ts{font-size:.5rem;color:#4848aa;margin-top:2px}
.music .ct{background:none;border:1px solid rgba(255,215,0,.04);color:#ffd700;cursor:pointer;font-size:.95rem;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.music .ct:hover{background:rgba(255,215,0,.05);border-color:rgba(255,215,0,.08)}
.music .ct.vl{color:#5a5aaa;border-color:rgba(255,255,255,.025)}
.music .ct.vl:hover{color:#ffd700}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  .page{padding:20px 24px}
  .rg{grid-template-columns:repeat(2,1fr)}
  .st .q{font-size:1.2rem}
  .rc .vl{font-size:2.2rem}
}
@media(max-width:560px){
  .page{padding:12px 10px}
  .hd{padding:10px 14px;gap:8px;flex-wrap:wrap;justify-content:center}
  .hd a{font-size:.65rem;padding:6px 10px}
  .hd .tg h1{font-size:.85rem;letter-spacing:2px}
  .hd .tg span{font-size:.45rem;letter-spacing:3px}
  .st{margin-bottom:18px}
  .st .q{font-size:.95rem}
  .rg{grid-template-columns:1fr;gap:12px}
  .rch{padding:12px 16px 8px}
  .rch .ic{font-size:1.3rem}
  .rch .ci .en{font-size:.6rem}
  .rch .ci .ar{font-size:.5rem}
  .rc .vl{font-size:1.8rem;padding:0 16px 2px}
  .rc .pl{font-size:.75rem;padding:4px 16px 14px}
  .music{padding:10px 14px}
}
@media(max-width:380px){
  .page{padding:8px 6px}
  .hd .tg h1{font-size:.7rem}
  .st .q{font-size:.8rem}
  .rc .vl{font-size:1.4rem}
  .rc .pl{font-size:.65rem}
}
</style>
</head>
<body class="scanlines">
<div class="conic-bg"></div>
<div class="page" id="page">
  <div class="mg" id="mg"></div>
  <canvas id="particles"></canvas>
  <div class="inner">
    <div class="hd">
      <a href="index.html">← Home</a>
      <a href="leaderboard.html">Leaderboard</a>
      <div class="tg">
        <h1>✦ World Records ✦</h1>
        <span>BrotherHood — Hall of Fame</span>
      </div>
    </div>
    <div class="st">
      <div class="q">"<span> greatness is not given. it is earned.</span> "</div>
    </div>
    <div class="rg" id="rg"></div>
    <div class="music">
      <button class="ct" id="abPlay">▶</button>
      <div class="in">
        <div class="tn" id="abTrack">No track</div>
        <div class="ts" id="abStatus">—</div>
      </div>
      <button class="ct vl" id="abVol">♫</button>
    </div>
  </div>
</div>

<script>
var DD=[{name:'Sl6an',nameAr:'سلطان',champion:3,mvp:2,goals:20,assists:15,saves:8},{name:'Raad',nameAr:'رعد',champion:2,mvp:3,goals:18,assists:12,saves:6},{name:'Samer',nameAr:'سامر',champion:2,mvp:2,goals:15,assists:10,saves:7},{name:'Rayan',nameAr:'ريان',champion:1,mvp:2,goals:12,assists:8,saves:5},{name:'Abdullah',nameAr:'عبدالله',champion:1,mvp:1,goals:10,assists:6,saves:4},{name:'Moayad',nameAr:'مؤيد',champion:0,mvp:1,goals:8,assists:5,saves:3},{name:'Abdulaziz',nameAr:'عبدالعزيز',champion:0,mvp:0,goals:6,assists:4,saves:2}];
function gd(){try{var d=JSON.parse(localStorage.getItem('bhLeaderboard'));if(d&&d.length)return d}catch(e){}try{localStorage.setItem('bhLeaderboard',JSON.stringify(DD))}catch(e){}return DD.slice()}
var CATS=[
  {key:'champion',icon:'🏆',en:'Most Champion Wins',ar:'أكثر عدد بطولات'},
  {key:'mvp',icon:'👑',en:'Most MVP Awards',ar:'أكثر جوائز أفضل لاعب'},
  {key:'goals',icon:'⚽',en:'Top Goalscorer',ar:'هداف البطولة'},
  {key:'assists',icon:'🎯',en:'Most Assists',ar:'أكثر تمريرات حاسمة'},
  {key:'saves',icon:'🛡️',en:'Most Saves',ar:'أكثر تصديات'}
];
function calcRecords(data){
  var recs={};
  CATS.forEach(function(c){
    var maxVal=Math.max.apply(null,data.map(function(p){return p[c.key]||0}));
    var tied=data.filter(function(p){return(p[c.key]||0)===maxVal});
    recs[c.key]={value:maxVal,players:tied};
  });
  return recs;
}
function render(){
  var data=gd(),rg=document.getElementById('rg');
  if(!data||!data.length){
    rg.innerHTML='<div class="emp"><span class="bg">🏆</span><div class="tx">No records yet</div><div class="sx">Data will appear once players join the leaderboard</div></div>';
    return;
  }
  var recs=calcRecords(data);
  rg.innerHTML=CATS.map(function(c,i){
    var r=recs[c.key];
    if(!r||r.value===0) return'<div class="rc"><div class="gl"></div><div class="rch"><span class="ic">'+c.icon+'</span><div class="ci"><div class="en">'+c.en+'</div><div class="ar">'+c.ar+'</div></div></div><div class="vl">—</div><div class="pl" style="color:#444488">No data</div><div class="ac">'+(i+1)+'</div></div>';
    var pNames=r.players.map(function(p){return'<span class="nm">'+p.name+'</span>'+(p.nameAr?' <span style="color:#5555aa;font-size:.7rem">('+p.nameAr+')</span>':'')}).join('<span class="sp"> — </span>');
    var multi=r.players.length>1;
    return'<div class="rc" style="animation-delay:'+(.05+(i+1)*.07)+'s"><div class="gl"></div><div class="rch"><span class="ic">'+c.icon+'</span><div class="ci"><div class="en">'+c.en+'</div><div class="ar">'+c.ar+'</div></div></div><div class="vl">'+r.value+'</div><div class="pl">'+(multi?'Tied: ':'')+pNames+'</div><div class="ac">'+(i+1)+'</div></div>';
  }).join('');
}
render();

(function(){var g=document.getElementById('mg');document.addEventListener('mousemove',function(e){g.style.left=e.clientX+'px';g.style.top=e.clientY+'px'});document.addEventListener('mouseleave',function(){g.style.opacity='0'});document.addEventListener('mouseenter',function(){g.style.opacity='1'})})();
(function(){var c=document.getElementById('particles'),ctx=c.getContext('2d');var ps=[],mx=-999,my=-999;function rs(){c.width=window.innerWidth;c.height=window.innerHeight}rs();window.addEventListener('resize',rs);document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY});for(var i=0;i<70;i++)ps.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2.5+.8,o:Math.random()*.3+.1,ph:Math.random()*Math.PI*2});function dr(){ctx.clearRect(0,0,c.width,c.height);for(var i=0;i<ps.length;i++){var p=ps[i],dx=mx-p.x,dy=my-p.y,dt=Math.sqrt(dx*dx+dy*dy);if(dt<220&&dt>0){var f=(220-dt)/220*.5;p.x-=dx/dt*f;p.y-=dy/dt*f}p.x+=p.vx;if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;p.y+=p.vy;if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;var al=p.o*(.6+.4*Math.sin(Date.now()/2000+p.ph));ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,215,0,'+al+')';ctx.fill()}for(var i=0;i<ps.length;i++)for(var j=i+1;j<ps.length;j++){var a=ps[i],b=ps[j];var dx=a.x-b.x,dy=a.y-b.y,dt=Math.sqrt(dx*dx+dy*dy);if(dt<140){var dmx=mx-a.x,dmy=my-a.y,md=Math.sqrt(dmx*dmx+dmy*dmy);var al=(1-dt/140)*.04;if(md<220)al*=Math.min(3*(1-md/220),2.5);if(al>.003){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle='rgba(255,215,0,'+al+')';ctx.lineWidth=.5;ctx.stroke()}}}requestAnimationFrame(dr)}dr()})();
try{localStorage.setItem('bhFromInternal','1')}catch(e){}

var aP=document.getElementById('abPlay'),aT=document.getElementById('abTrack'),aS=document.getElementById('abStatus'),aV=document.getElementById('abVol');var au=new Audio();au.volume=.05;var sy=false;var lbTrack='music/track2.mp3';function sA(){try{var s=JSON.parse(localStorage.getItem('bhAudio'));if(s&&s.src){au.src=lbTrack;if(s.ct>0&&s.src.indexOf('track2')>-1)au.currentTime=s.ct;au.volume=s.vol||.05;au.muted=s.muted||false;var fromInt=localStorage.getItem('bhFromInternal');if(fromInt&&s.playing){au.play().catch(function(){})}aT.textContent='World Records Track';aS.textContent=s.playing?'Playing':'Paused';aP.textContent=s.playing?'⏸':'▶';sy=true}}catch(e){}if(!sy){au.src=lbTrack;aT.textContent='World Records Track';aS.textContent='—';var fromInt=localStorage.getItem('bhFromInternal');if(fromInt){au.play().catch(function(){});aP.textContent='⏸';aS.textContent='Playing';sy=true}}sy=false}sA();au.addEventListener('play',function(){aP.textContent='⏸';aS.textContent='Playing';ss()});au.addEventListener('pause',function(){aP.textContent='▶';aS.textContent='Paused';ss()});function ss(){try{localStorage.setItem('bhAudio',JSON.stringify({src:au.src,ct:au.currentTime,cur:0,vol:au.volume,playing:!au.paused,muted:au.muted}))}catch(e){}}au.addEventListener('timeupdate',ss);aP.addEventListener('click',function(){if(au.src){if(au.paused)au.play().catch(function(){});else au.pause()}});aV.addEventListener('click',function(){au.muted=!au.muted;aV.textContent=au.muted?'♪':'♫';ss()});setInterval(function(){if(!au.paused&&au.duration)aS.textContent=(au.currentTime/au.duration*100).toFixed(0)+'%'},2000);
</script>
</body>
</html>
